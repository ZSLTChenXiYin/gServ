version: '3.8'

services:
  # MySQL 8.0.36 数据库
  mysql:
    image: mysql:8.0.36
    container_name: gserv-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gserv}
      MYSQL_USER: ${MYSQL_USER:-gserv_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gserv_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./app/mysql:/var/lib/mysql
    networks:
      - gserv-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # gServ 游戏服务端
  gserv:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: gserv-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:8080"   # HTTP API 服务端口
      - "${TCP_PORT:-9090}:9090"    # TCP 长连接服务端口
    volumes:
      - ./app:/app
    networks:
      - gserv-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:
    driver: local

networks:
  gserv-network:
    driver: bridge